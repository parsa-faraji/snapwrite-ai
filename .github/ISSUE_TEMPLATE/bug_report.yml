name: Bug report
description: Report something broken in the extension, backend, website, or docs.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include the website or flow where the issue appears.
      placeholder: |
        1. Go to ...
        2. Select ...
        3. Click ...
        4. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: "Chrome 125, Arc, Brave, Edge, etc."
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Screenshots, console errors, or logs.
