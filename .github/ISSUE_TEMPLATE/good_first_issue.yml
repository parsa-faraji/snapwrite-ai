name: Good first issue
description: Use this to propose a small scoped task for new contributors.
title: "[Good first issue]: "
labels: ["good first issue", "help wanted"]
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: What needs to change?
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Likely files
      description: Point contributors at the files they probably need.
      placeholder: |
        - extension/content.js
        - tests/extension.spec.js
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - ...
        - ...
    validations:
      required: true
