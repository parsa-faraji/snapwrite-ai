name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run Playwright tests
        run: npm test
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.node-version }}
          path: playwright-report/
          retention-days: 7

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check for common issues
        run: |
          # Check for console.log statements in production code
          echo "Checking for console.log in extension and backend..."
          if grep -r "console\.log\|console\.debug" extension/!(manifest.json) backend/ --include="*.js" 2>/dev/null; then
            echo "Warning: Found console statements in code"
          fi

          # Verify manifest.json is valid JSON
          echo "Validating extension manifest..."
          node -e "JSON.parse(require('fs').readFileSync('extension/manifest.json', 'utf8'))"

          # Verify package.json files are valid
          echo "Validating package.json files..."
          node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('backend/package.json', 'utf8'))"

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install && cd backend && npm install

      - name: Run npm audit
        continue-on-error: true
        run: npm audit --audit-level=moderate
