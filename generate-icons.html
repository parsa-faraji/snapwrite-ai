<!DOCTYPE html>
<html>
<head><title>Generate SnapWrite AI Icons</title></head>
<body>
<h2>SnapWrite AI — Icon Generator</h2>
<p>Right-click each icon below and "Save Image As" to the <code>extension/icons/</code> folder.</p>
<div style="display:flex;gap:24px;align-items:end;margin:24px 0;">
  <div>
    <canvas id="c16" width="16" height="16"></canvas>
    <p>icon16.png</p>
  </div>
  <div>
    <canvas id="c48" width="48" height="48"></canvas>
    <p>icon48.png</p>
  </div>
  <div>
    <canvas id="c128" width="128" height="128"></canvas>
    <p>icon128.png</p>
  </div>
</div>
<script>
function draw(id, size) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  const r = size * 0.22;

  // Rounded rect background with gradient
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#4f46e5');
  grad.addColorStop(1, '#7c3aed');

  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Letter Q
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `bold ${size * 0.6}px -apple-system, BlinkMacSystemFont, sans-serif`;
  ctx.fillText('Q', size / 2, size / 2 + size * 0.02);
}

draw('c16', 16);
draw('c48', 48);
draw('c128', 128);
</script>
</body>
</html>
