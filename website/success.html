<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to SnapWrite AI Pro</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .success-wrap {
      max-width: 560px;
      margin: 80px auto;
      padding: 48px 40px;
      background: #fff;
      border: 1px solid #e9e5dd;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      text-align: center;
    }
    .success-badge {
      width: 56px; height: 56px;
      margin: 0 auto 20px;
      background: #ecfdf5;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .license-box {
      margin: 24px 0;
      padding: 18px;
      background: #f7f3ec;
      border: 1px dashed #c8b48a;
      border-radius: 10px;
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 16px;
      word-break: break-all;
      cursor: pointer;
      transition: background 0.15s;
    }
    .license-box:hover { background: #f0e8d6; }
    .license-status { font-size: 14px; color: #8c7a52; margin-top: 8px; }
    .next-steps {
      text-align: left;
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid #f0ebe0;
    }
    .next-steps ol { padding-left: 20px; }
    .next-steps li { margin-bottom: 10px; color: #4a4538; }
    .pending { color: #8c7a52; }
  </style>
</head>
<body>

  <nav>
    <div class="wrap">
      <a href="/" class="nav-logo">
        <div class="nav-logo-icon">S</div>
        SnapWrite AI
      </a>
    </div>
  </nav>

  <main class="success-wrap">
    <div class="success-badge">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    </div>

    <h1 style="margin-bottom:8px;">You're in.</h1>
    <p>Thanks for subscribing to SnapWrite AI Pro. Your license key is below.</p>

    <div id="license-area">
      <p class="pending" id="status-msg">Generating your license key…</p>
    </div>

    <div class="next-steps">
      <strong>Next steps</strong>
      <ol>
        <li>Copy your license key above.</li>
        <li>Click the <strong>SnapWrite AI</strong> extension icon in Chrome → <strong>Options</strong>.</li>
        <li>Paste your license key and click <strong>Activate</strong>. Done.</li>
      </ol>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session_id");
    const API = "https://snap-write-ai-production.up.railway.app";
    const licenseArea = document.getElementById("license-area");
    const statusMsg = document.getElementById("status-msg");

    if (!sessionId) {
      statusMsg.textContent = "Missing session_id. If you just paid, check your Stripe receipt or email support@snapwrite.io.";
    } else {
      let attempts = 0;
      const maxAttempts = 15; // ~30s

      async function poll() {
        attempts++;
        try {
          const res = await fetch(`${API}/api/checkout-session?session_id=${encodeURIComponent(sessionId)}`);
          const data = await res.json();

          if (data.license_key) {
            licenseArea.innerHTML = `
              <div class="license-box" id="license-key" title="Click to copy">${data.license_key}</div>
              <p class="license-status">Status: ${data.license_status}</p>
            `;
            document.getElementById("license-key").addEventListener("click", () => {
              navigator.clipboard.writeText(data.license_key);
              document.getElementById("license-key").textContent = "Copied!";
              setTimeout(() => { document.getElementById("license-key").textContent = data.license_key; }, 1200);
            });
            return;
          }

          if (attempts < maxAttempts) {
            setTimeout(poll, 2000);
          } else {
            statusMsg.textContent = "License key is still being generated. Refresh in a moment, or check your email.";
          }
        } catch (err) {
          statusMsg.textContent = "Something went wrong fetching your license. Email support@snapwrite.io with your session ID.";
        }
      }

      poll();
    }
  </script>

</body>
</html>
